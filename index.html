<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BundleBoss — Product bundles &amp; configurators for WooCommerce</title>
<meta name="description" content="BundleBoss: flexible product bundles, PC-builder-style configurators, compatibility rules and shareable builds for WooCommerce. Coming soon.">
<style>
  :root {
    --bg: #0f1420;
    --bg2: #161d2e;
    --text: #e8eaf0;
    --muted: #8b93a7;
    --accent: #7c3aed;
    --accent2: #a78bfa;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: radial-gradient(1200px 800px at 70% -10%, #221a3d 0%, var(--bg) 55%) fixed, var(--bg);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
  }
  main { max-width: 640px; }
  .mark {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 36px;
  }
  .mark-icon {
    width: 52px; height: 52px;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--accent) 0%, #5b21b6 100%);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 30px rgba(124, 58, 237, 0.35);
  }
  .mark-icon svg { width: 28px; height: 28px; }
  .mark-name {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.02em;
  }
  .mark-name span { color: var(--accent2); }
  h1 {
    font-size: clamp(28px, 5.5vw, 44px);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1.15;
    margin-bottom: 18px;
  }
  h1 em {
    font-style: normal;
    background: linear-gradient(90deg, var(--accent2), #c4b5fd);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  p.lede {
    font-size: 17px;
    line-height: 1.65;
    color: var(--muted);
    margin: 0 auto 36px;
    max-width: 520px;
  }
  .badge {
    display: inline-block;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--accent2);
    border: 1px solid rgba(167, 139, 250, 0.35);
    border-radius: 100px;
    padding: 7px 16px;
    margin-bottom: 22px;
  }
  .contact {
    font-size: 15px;
    color: var(--muted);
  }
  .contact a {
    color: var(--text);
    text-decoration: none;
    border-bottom: 1px solid rgba(232, 234, 240, 0.25);
    padding-bottom: 1px;
    transition: border-color 0.15s, color 0.15s;
  }
  .contact a:hover { color: var(--accent2); border-color: var(--accent2); }
  footer {
    margin-top: 56px;
    font-size: 12.5px;
    color: #5a6177;
  }
</style>
</head>
<body>
<main>
  <div class="mark">
    <div class="mark-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 8l-9-5-9 5 9 5 9-5z"/>
        <path d="M3 8v8l9 5 9-5V8"/>
        <path d="M12 13v8"/>
      </svg>
    </div>
    <div class="mark-name">Bundle<span>Boss</span></div>
  </div>

  <div><span class="badge">Coming soon</span></div>

  <h1>Product bundles &amp; <em>build-your-own</em> configurators for WooCommerce</h1>

  <p class="lede">
    Fixed bundles, PC-builder-style choice slots, compatibility rules,
    quantity logic and shareable builds — one plugin, any kind of store.
  </p>

  <p class="contact">
    Questions? <a href="mailto:support@getbundleboss.com">support@getbundleboss.com</a>
  </p>

  <footer>© 2026 BundleBoss</footer>
</main>
</body>
</html>
